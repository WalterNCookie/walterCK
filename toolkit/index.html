<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CK - Toolkit</title>
  
  <link rel="icon" href="/images/walterck.PNG" />
  <link rel="stylesheet" href="../styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Oxanium" rel="stylesheet">
  <meta name="robots" content="noindex">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="toolkit-page">

  <main class="container">
    <section class="toolkit-hero">

      <h1 class= "strong">My iPhone Toolkit</h1>
      <div class="search-row">
        <a href="../" class="back-btn">
          <i data-lucide="arrow-left" size="18"></i>
        </a>
        <div class="search">
          <i data-lucide="search" size="18"></i>
          <input id="q" placeholder="Search title, tag, or category..." autocomplete="off">
        </div>
      </div>

      <div class="filters" id="filters"></div>
    </section>

    <div id="grid-container"></div>
    <p id="empty" style="display:none;">No tools found.</p>

  </main>

  <script src="../script.js"></script>
</body>
</html>
