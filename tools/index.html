<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CK Tools</title>
  
  <link rel="icon" href="images/walterck.PNG" />
  <link rel="stylesheet" href="../styles.css" />
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="tools-page">

  <main class="container">
    <section class="tools-hero">
      <a href="../" class="back-btn">
        <i data-lucide="arrow-left" size="18"></i> Back
      </a>

      <h1>My Tools</h1>

      <div class="search">
        <i data-lucide="search" size="18"></i>
        <input id="q" placeholder="Search title, tag, or category..." autocomplete="off">
      </div>

      <div class="filters" id="filters"></div>
    </section>

    <div id="grid-container"></div>
    <p id="empty" style="display:none;">No tools found.</p>

  </main>

  <script src="../script.js"></script>
</body>
</html>
